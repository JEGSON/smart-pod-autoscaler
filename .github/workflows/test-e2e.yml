name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PATH: ${{ github.workspace }}/bin:$PATH
  KUBEBUILDER_ASSETS: ${{ github.workspace }}/bin

jobs:
  ci:
    name: Lint, Test, E2E, Build & Push
    runs-on: ubuntu-latest

    steps:
      # --- Checkout ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Setup Go ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      # --- Install golangci-lint ---
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b ./bin v1.55.2

      # --- Run Lint ---
      - name: Run Lint
        run: ./bin/golangci-lint run

      # --- Install controller-gen ---
      - name: Install controller-gen
        run: |
          mkdir -p ./bin
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1
          mv $(go env GOBIN)/controller-gen ./bin/ || mv $(go env GOPATH)/bin/controller-gen ./bin/

      # --- Install setup-envtest ---
      - name: Install setup-envtest
        run: |
          mkdir -p ./bin
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.23
          mv $(go env GOBIN)/setup-envtest ./bin/ || mv $(go env GOPATH)/bin/setup-envtest ./bin/
          ./bin/setup-envtest use 1.35.0 --bin-dir ./bin

      # --- Tidy Go modules ---
      - name: Tidy Go modules
        run: go mod tidy

      # --- Run Unit Tests ---
      - name: Run Unit Tests
        run: go test ./... -coverpkg=./... -coverprofile=cover.out

      # --- Set up Kind for E2E ---
      - name: Set up Kind for E2E
        uses: helm/kind-action@v1.10.0
        with:
          config: test/kind-config.yaml
          cluster_name: smart-pod-autoscaler-test-e2e

      # --- Build Docker Image ---
      - name: Build controller image
        run: docker build -t ghcr.io/jegson/smart-pod-autoscaler:latest .

      # --- Push Docker Image ---
      - name: Push controller image
        run: docker push ghcr.io/jegson/smart-pod-autoscaler:latest

      # --- Run E2E Tests ---
      - name: Run E2E Tests
        run: make test-e2e IMG=ghcr.io/jegson/smart-pod-autoscaler:latest