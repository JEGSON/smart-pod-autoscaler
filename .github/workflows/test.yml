name: Tests

on:
  push:
  pull_request:

env:
  # Force Actions to use Node.js 24 to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Add local bin to PATH so controller-gen and envtest are found
  PATH: ${{ github.workspace }}/bin:$PATH
jobs:
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Install controller-gen
        run: |
          mkdir -p ./bin
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1
          mv $(go env GOPATH)/bin/controller-gen ./bin/

      - name: Install setup-envtest
        run: |
          mkdir -p ./bin
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.23
          mv $(go env GOPATH)/bin/setup-envtest ./bin/
          ./bin/setup-envtest use 1.35.0 --bin-dir ./bin

      - name: Tidy Go modules
        run: go mod tidy

      - name: Run Tests
        run: |
          export KUBEBUILDER_ASSETS=$(pwd)/bin
          go test ./... -coverpkg=./... -coverprofile=cover.out