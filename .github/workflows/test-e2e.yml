name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PATH: ${{ github.workspace }}/bin:$PATH

jobs:
  test-e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Install controller-gen
        run: |
          mkdir -p ./bin
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1
          mv $(go env GOPATH)/bin/controller-gen ./bin/

      - name: Install setup-envtest
        run: |
          mkdir -p ./bin
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.23
          mv $(go env GOPATH)/bin/setup-envtest ./bin/
          ./bin/setup-envtest use 1.35.0 --bin-dir ./bin

      - name: Set up Kind
        uses: helm/kind-action@v1.10.0
        with:
          config: test/kind-config.yaml
          cluster_name: smart-pod-autoscaler-test-e2e

      - name: Tidy Go modules
        run: go mod tidy

      - name: Build controller image
        run: docker build -t controller:latest .

      - name: Run E2E Tests
        run: |
          export KUBEBUILDER_ASSETS=$(pwd)/bin
          make test-e2e IMG=controller:latest