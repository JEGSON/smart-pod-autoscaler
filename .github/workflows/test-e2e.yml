name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-e2e:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # Use stable version
          cache: true

      - name: Set up Kind
        uses: helm/kind-action@v1.10.0
        with:
          config: test/kind-config.yaml
          cluster_name: smart-pod-autoscaler-test-e2e

      - name: Run E2E Tests
        run: |
          go mod tidy
          make test-e2e IMG=controller:latest
