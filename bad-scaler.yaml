apiVersion: autoscaler.autoscaler.io/v1alpha1
kind: SmartScaler
metadata:
  name: bad-scaler
spec:
  minReplicas: 2
  maxReplicas: 10
  metric:
    source: prometheus
    endpoint: "http://prometheus:9090"
    query: "sum(kube_pod_info)"
  scalingPolicy:
    scaleUpThreshold: 1000
    scaleDownThreshold: 100
    cooldownSeconds: 60
