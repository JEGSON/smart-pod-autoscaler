# This rule is not used by the project smart-pod-autoscaler itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to autoscaler.autoscaler.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: smart-pod-autoscaler
    app.kubernetes.io/managed-by: kustomize
  name: smartscaler-viewer-role
rules:
- apiGroups:
  - autoscaler.autoscaler.io
  resources:
  - smartscalers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - autoscaler.autoscaler.io
  resources:
  - smartscalers/status
  verbs:
  - get
