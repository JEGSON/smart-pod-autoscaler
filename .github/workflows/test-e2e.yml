name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  KUBEBUILDER_ASSETS: ${{ github.workspace }}/bin

jobs:
  ci:
    name: Lint, Unit, and E2E Tests
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Add local bin to PATH
      - name: Add local bin to PATH
        run: echo "${{ github.workspace }}/bin" >> $GITHUB_PATH

      # Setup Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      # Run Lint (Stable official action)
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5
          args: --timeout=5m

      # Install controller-gen
      - name: Install controller-gen
        run: |
          mkdir -p ./bin
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1
          mv $(go env GOBIN)/controller-gen ./bin/ || mv $(go env GOPATH)/bin/controller-gen ./bin/

      # Install setup-envtest and kubebuilder binaries
      - name: Install setup-envtest
        run: |
          mkdir -p ./bin
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.23
          mv $(go env GOBIN)/setup-envtest ./bin/ || mv $(go env GOPATH)/bin/setup-envtest ./bin/
          ./bin/setup-envtest use 1.35.0 --bin-dir ./bin

      # Tidy Go modules
      - name: Tidy Go modules
        run: go mod tidy

      # Run Unit Tests
      - name: Run Go Unit Tests
        run: go test ./... -coverpkg=./... -coverprofile=cover.out

      # Set up Kind cluster for E2E
      - name: Set up Kind
        uses: helm/kind-action@v1.10.0
        with:
          config: test/kind-config.yaml
          cluster_name: smart-pod-autoscaler-test-e2e

      # Build Docker controller image (lowercase tags for GHCR)
      - name: Build controller image
        run: docker build -t controller:latest .

      # Run E2E tests
      - name: Run E2E Tests
        run: make test-e2e IMG=controller:latest