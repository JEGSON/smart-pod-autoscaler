name: Release Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - "helm/**"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          mkdir -p .chart-packages
          helm package helm/smart-pod-autoscaler --destination .chart-packages
          ls -la .chart-packages/

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Helm repo index
        run: |
          cp .chart-packages/*.tgz gh-pages/
          helm repo index gh-pages/ \
            --url https://JEGSON.github.io/smart-pod-autoscaler
          cat gh-pages/index.yaml

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git add .
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: release chart $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin gh-pages