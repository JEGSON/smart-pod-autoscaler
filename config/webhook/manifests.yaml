---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-autoscaler-autoscaler-io-v1alpha1-smartscaler
  failurePolicy: Fail
  name: msmartscaler-v1alpha1.kb.io
  rules:
  - apiGroups:
    - autoscaler.autoscaler.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - smartscalers
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-autoscaler-autoscaler-io-v1alpha1-smartscaler
  failurePolicy: Fail
  name: vsmartscaler-v1alpha1.kb.io
  rules:
  - apiGroups:
    - autoscaler.autoscaler.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - smartscalers
  sideEffects: None
