name: Tests

on:
  push:
  pull_request:

env:
  # Force Actions to use Node.js 24 to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'  # upgraded to latest Go 1.25
          cache: true

      - name: Install controller-gen
        run: |
          mkdir -p ./bin
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1

      - name: Setup envtest binaries
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.23
          setup-envtest use 1.35.x --bin-dir ./bin

      - name: Tidy Go modules
        run: go mod tidy

      - name: Run Tests
        run: |
          # Use modern coverage flags, no covdata
          go test ./... -coverpkg=./... -coverprofile=cover.out
