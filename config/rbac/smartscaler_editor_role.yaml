# This rule is not used by the project smart-pod-autoscaler itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the autoscaler.autoscaler.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: smart-pod-autoscaler
    app.kubernetes.io/managed-by: kustomize
  name: smartscaler-editor-role
rules:
- apiGroups:
  - autoscaler.autoscaler.io
  resources:
  - smartscalers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - autoscaler.autoscaler.io
  resources:
  - smartscalers/status
  verbs:
  - get
